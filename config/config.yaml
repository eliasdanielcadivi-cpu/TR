ai:
  aliases:
    deepseek:
      model: deepseek-chat
      provider: deepseek
    gemma:
      model: gemma3:4b
      provider: gemma
    gemma12b:
      model: gemma3:12b
      provider: gemma
    openrouter:
      model: google/gemma-3-4b-it
      provider: openrouter
  deepseek:
    api_key_env: sk-2ceebfa3da2d444199e242bbc17feedc
    base_url: https://api.deepseek.com
    model: deepseek-chat
  default_provider: gemma
  enabled: true
  gemma:
    base_url: http://localhost:11434
    model: gemma3:4b
    templates_dir: modules/ia/templates/gemma
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    model: google/gemma-3-4b-it
identity:
  full_name: Terminal Remote Operations Nexus
  name: ARES
  window_title: Ares por Daniel Hung
kitty:
  allow_remote_control: 'yes'
  conf_path: config/kitty.conf
  socket: unix:/tmp/mykitty
  socket_path: /tmp/mykitty
paths:
  db: db/tr.sqlite
  logs: logs/session.jsonl
  sessions: data/sessions
templates:
  base_dir: modules/ia/templates
  deepseek:
  - description: "Plantilla b\xE1sica para DeepSeek"
    name: default
  defaults:
    deepseek: default
    gemma: default
  enabled: true
  gemma:
  - description: "Plantilla b\xE1sica para consultas generales"
    name: default
  - description: Optimizada para conversaciones multi-turno
    name: chat
  - description: "Generaci\xF3n y explicaci\xF3n de c\xF3digo"
    name: code
  - description: Function calling con herramientas
    name: tools
tools:
  available:
  - api_key_env: SERPER_API_KEY
    enabled: true
    name: google_search
  - api_key_env: ''
    enabled: true
    name: translate_text
  - api_key_env: OPENWEATHER_API_KEY
    enabled: true
    name: get_weather
  - enabled: true
    name: execute_shell
    timeout: 30
  - enabled: true
    max_lines: 100
    name: read_file
  - enabled: true
    name: write_file
  enabled: true
